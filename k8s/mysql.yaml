# create mysql database with secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: prod
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "vault-role"
        vault.hashicorp.com/agent-inject-secret-MYSQL_ROOT_PASSWORD: "secret/mysql"
        vault.hashicorp.com/agent-inject-template-MYSQL_ROOT_PASSWORD: |
          {{- with secret "secret/mysql" -}}
          export MYSQL_ROOT_PASSWORD = "{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-MYSQL_DATABASE: "secret/mysql"
        vault.hashicorp.com/agent-inject-template-MYSQL_DATABASE: |
          {{- with secret "secret/mysql" -}}
          export MYSQL_DATABASE = "{{ .Data.data.database }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-MYSQL_USER: "secret/mysql"
        vault.hashicorp.com/agent-inject-template-MYSQL_USER: |
          {{- with secret "secret/mysql" -}}
          export MYSQL_USER = "{{ .Data.data.username }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-MYSQL_PASSWORD: "secret/mysql"
        vault.hashicorp.com/agent-inject-template-MYSQL_PASSWORD: |
          {{- with secret "secret/mysql" -}}
          export MYSQL_PASSWORD = "{{ .Data.data.password }}"
          {{- end }}
    spec:      
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        resources:
          requests:
            memory: "1Gi"
            cpu: "256m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
    
---
apiVersion: storage.k8s.io/v1
kind : StorageClass 
metadata:
  name: ebs-csi-sc
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
  iopsPerGB: "10"
reclaimPolicy: Delete # Delete if you want to delete the volume when PVC is deleted, Retain if you want to keep the volume when PVC is deleted
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: ebs-csi-sc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: prod
spec:
  selector:
    app: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
